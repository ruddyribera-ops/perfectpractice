name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Wait for postgres
        run: sleep 5

      - name: Create railway database
        run: |
          pip install psycopg2-binary -q
          python -c "
          import psycopg2, os
          conn = psycopg2.connect(host='localhost', port=5432, user='postgres', password='testpassword', dbname='postgres')
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute(\"SELECT 1 FROM pg_database WHERE datname='railway'\")
          if not cur.fetchone():
              cur.execute('CREATE DATABASE railway')
              print('Created railway DB')
          else:
              print('railway DB already exists')
          conn.close()
          "

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/railway
        run: pytest backend/ -v --tb=short

  deploy-backend:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: lucid-serenity

  deploy-frontend:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: proactive-wisdom