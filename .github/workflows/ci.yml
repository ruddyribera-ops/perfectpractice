name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testrailway
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Wait for postgres
        run: sleep 5

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/testrailway
        run: pytest backend/ -v --tb=short

  deploy-backend:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: lucid-serenity

  deploy-frontend:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: proactive-wisdom