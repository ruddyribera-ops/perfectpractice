name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Wait for postgres
        run: sleep 5

      - name: Create railway database
        run: |
          pip install psycopg2-binary -q
          python -c "
          import psycopg2, os
          conn = psycopg2.connect(host='localhost', port=5432, user='postgres', password='testpassword', dbname='postgres')
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute(\"SELECT 1 FROM pg_database WHERE datname='railway'\")
          if not cur.fetchone():
              cur.execute('CREATE DATABASE railway')
              print('Created railway DB')
          else:
              print('railway DB already exists')
          conn.close()
          "

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/railway
        run: |
          # Seed test users (idempotent — skips if already exists)
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession, async_sessionmaker
          from sqlalchemy.exc import IntegrityError
          from app.core.security import get_password_hash
          from app.models.user import User, UserRole, Student, Teacher
          from app.core.database import Base

          async def seed():
              engine = create_async_engine('postgresql+asyncpg://postgres:testpassword@localhost:5432/railway')
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              sm = async_sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)

              async with sm() as s:
                  def add_user(email, name, role, extra=None):
                      try:
                          u = User(email=email, password_hash=get_password_hash('test123'), name=name, role=role)
                          s.add(u)
                          s.flush()
                          if extra:
                              extra(u.id)
                          s.commit()
                          print(f'Created {email}')
                      except IntegrityError:
                          s.rollback()
                          print(f'Skipping {email} (already exists)')

                  add_user('student@test.com', 'Test Student', UserRole.student, lambda uid: s.add(Student(user_id=uid, grade=3)))
                  add_user('teacher@test.com', 'Test Teacher', UserRole.teacher, lambda uid: s.add(Teacher(user_id=uid)))
                  add_user('admin@test.com', 'Test Admin', UserRole.admin)
                  print('Seed complete')

          asyncio.run(seed())
          "
          pytest tests/ -v --tb=short

  deploy-backend:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: lucid-serenity

  deploy-frontend:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: proactive-wisdom